name: Publish MCP container

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/asafichaki/renology-cost-data-mcp:${{ github.ref_name }}
            ghcr.io/asafichaki/renology-cost-data-mcp:1.0.1
            ghcr.io/asafichaki/renology-cost-data-mcp:latest
          labels: |
            io.modelcontextprotocol.server.name=io.github.asafichaki/renology-cost-data
            org.opencontainers.image.source=https://github.com/asafichaki/renology-cost-data-mcp
            org.opencontainers.image.description=Read-only MCP server for Renology city-level home renovation planning cost data
            org.opencontainers.image.licenses=MIT
